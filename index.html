<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/style.css">

  <title>Frontend Mentor | Product preview card component</title>
</head>

<body>
  <main class="card">
    <picture>
      <source srcset="./assets/images/image-product-desktop.jpg" media="(min-width: 768px)">
      <img class="top-image" src="./assets/images/image-product-mobile.jpg" alt="Picture with Perfume" />
    </picture>
    <div class="content">
    <header class="perfume">
      <div class="perfume-type">Perfume</div>
      <h1 class="perfume-name">Gabrielle Essence Eau De Parfum</h1>
      <p class="perfume-description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>
    </header>
    <section class="price">
      <h1 class="discounted-price">$149.99</h1>
      <p class="normal-price">$169.99</p>
    </section>
    <section class="add-to-card">
      <a href="https://somelinkforai.com" aria-label="Add to Card">
        <svg width="18" height="18">
          <image xlink:href="./assets/images/icon-cart.svg"></image>
        </svg>
        <span>Add to Cart</span> 
      </a>u
    </section>
    </div>
  </main>
</body>
</html>
